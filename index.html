<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>みどり造園 社内マップ（スマホ横）</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { height:100%; }
  body { font-family:"Yu Gothic UI","Hiragino Sans",Meiryo,sans-serif; background:#dfe3da; color:#243324;
    overflow-x:hidden; }

  /* ===== 透過フローティングタイトル（地図の上に薄く重ねる・邪魔にならない） ===== */
  .titlebar {
    position:fixed; top:8px; left:8px; z-index:60;
    display:flex; align-items:center; gap:8px;
    background:rgba(46,93,52,.55); color:#fff; backdrop-filter:blur(4px);
    -webkit-backdrop-filter:blur(4px);
    padding:6px 12px; border-radius:20px; box-shadow:0 1px 6px rgba(0,0,0,.25);
    font-size:13px; font-weight:bold; cursor:pointer; user-select:none;
    transition:opacity .2s, transform .2s; max-width:calc(100vw - 16px);
  }
  .titlebar .sub { font-size:10px; font-weight:normal; opacity:.9; }
  .titlebar.min { opacity:.5; }
  .titlebar.min .txt { display:none; }

  /* ===== フローティング操作バー（右上・コンパクト・半透明） ===== */
  .toolbar {
    position:fixed; top:8px; right:8px; z-index:60;
    display:flex; gap:6px; align-items:center; flex-wrap:wrap; justify-content:flex-end;
    max-width:calc(100vw - 16px);
  }
  .toolbar input[type="text"] {
    width:150px; padding:7px 12px; border:none; border-radius:18px;
    font-size:14px; outline:none; background:rgba(255,255,255,.9); box-shadow:0 1px 4px rgba(0,0,0,.2);
  }
  .modebtn {
    font-size:12px; padding:7px 11px; border-radius:18px; border:none;
    background:rgba(255,255,255,.9); color:#2e5d34; cursor:pointer; user-select:none;
    box-shadow:0 1px 4px rgba(0,0,0,.2); white-space:nowrap;
  }
  .modebtn.on { background:#c8a24a; color:#fff; }

  /* ===== フローティング凡例（左下・半透明） ===== */
  .legend {
    position:fixed; left:8px; bottom:8px; z-index:55;
    display:flex; gap:12px; padding:5px 12px; font-size:11px; color:#243324; align-items:center;
    background:rgba(255,255,255,.82); border-radius:16px; box-shadow:0 1px 5px rgba(0,0,0,.18);
    backdrop-filter:blur(3px); -webkit-backdrop-filter:blur(3px);
  }
  .legend span { display:inline-flex; align-items:center; gap:4px; }
  .legend i { width:12px; height:12px; border-radius:50%; display:inline-block; border:2px solid #fff;
    box-shadow:0 0 2px rgba(0,0,0,.4); }
  .legend i.r{ background:#d84a3a;} .legend i.b{ background:#1e78c8;} .legend i.g{ background:#c8a24a;}

  /* ===== 地図（横画面で高さいっぱいに収める） ===== */
  .map-wrap { display:flex; justify-content:center; align-items:center; min-height:100vh;
    min-height:100dvh; padding:4px; }
  .map-inner { position:relative; width:100%;
    max-width:calc(96vh * 1.319); max-width:calc(96dvh * 1.319); /* 950/720=1.319 */
  }
  .map-inner svg { width:100%; display:block; border-radius:10px; box-shadow:0 2px 10px rgba(0,0,0,.2); }
  .map-inner img.aerial { width:100%; display:none; border-radius:10px; box-shadow:0 2px 10px rgba(0,0,0,.2); }
  body.photo .map-inner svg { display:none; }
  body.photo .map-inner img.aerial { display:block; }

  .pin { position:absolute; transform:translate(-50%,-50%); cursor:pointer; z-index:5;
    display:flex; flex-direction:column; align-items:center; }
  .pin .dot {
    width:22px; height:22px; border-radius:50%;
    background:#d84a3a; border:2px solid #fff; box-shadow:0 1px 4px rgba(0,0,0,.55);
    display:flex; align-items:center; justify-content:center;
    color:#fff; font-size:11px; font-weight:bold;
  }
  .pin.f2 .dot { background:#1e78c8; }
  .pin .lbl {
    margin-top:2px; background:rgba(255,255,255,.92); color:#243324; font-size:9px; font-weight:bold;
    padding:1px 5px; border-radius:7px; white-space:nowrap; box-shadow:0 1px 2px rgba(0,0,0,.4);
    max-width:110px; overflow:hidden; text-overflow:ellipsis;
  }
  body:not(.showlbl) .pin .lbl { display:none; }
  .pin.hit .dot { background:#c8a24a; transform:scale(1.15); }
  .pin.dim { opacity:.25; }

  /* ===== 場所一覧（地図の下・スクロールで表示） ===== */
  .list { padding:14px 12px 40px; max-width:900px; margin:0 auto; }
  .list h2 { font-size:14px; color:#2e5d34; margin:6px 2px 8px; }
  .cards { display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:8px; }
  .card {
    background:#fff; border-radius:10px; padding:8px 10px; cursor:pointer;
    box-shadow:0 1px 4px rgba(0,0,0,.08); display:flex; align-items:center; gap:9px;
  }
  .card .num {
    flex:none; width:26px; height:26px; border-radius:50%; background:#d84a3a; color:#fff;
    font-size:12px; font-weight:bold; display:flex; align-items:center; justify-content:center;
  }
  .card.f2 .num { background:#1e78c8; }
  .card.hit .num { background:#c8a24a; }
  .card .nm { font-size:14px; font-weight:bold; }
  .card .fl { font-size:10px; color:#7a8f7a; margin-top:1px; }
  .card.hidden { display:none; }
  .card .thumb { flex:none; width:42px; height:42px; border-radius:6px; object-fit:cover; }

  /* ===== 写真ビューア（拡大→全体→閉じる） ===== */
  .viewer { position:fixed; inset:0; background:rgba(0,0,0,.92); z-index:200; display:none; }
  .viewer.show { display:block; }
  .viewer img.vimg {
    position:absolute; top:0; left:0; width:100%; height:100%; cursor:pointer;
    transition:none;
  }
  .viewer img.vimg.zoom { object-fit:cover; }   /* 拡大＝画面いっぱい（端が切れる） */
  .viewer img.vimg.fit  { object-fit:contain; } /* 全体＝写真全部が見える */
  .vtop {
    position:absolute; top:0; left:0; right:0; z-index:2;
    display:flex; align-items:center; gap:10px; padding:10px 12px;
    background:linear-gradient(rgba(0,0,0,.55), rgba(0,0,0,0)); color:#fff; pointer-events:none;
  }
  .vtop .vname { font-size:15px; font-weight:bold; flex:1; }
  .vtop .vstate { font-size:11px; background:rgba(255,255,255,.22); padding:3px 10px; border-radius:12px; }
  .vtop .vclose { pointer-events:auto; background:rgba(255,255,255,.25); border:none; color:#fff;
    width:34px; height:34px; border-radius:50%; font-size:17px; cursor:pointer; }
  .vnav {
    position:absolute; top:50%; transform:translateY(-50%); z-index:2;
    width:44px; height:64px; border:none; border-radius:10px;
    background:rgba(255,255,255,.16); color:#fff; font-size:30px; cursor:pointer; line-height:1;
  }
  .vnav.prev { left:8px; } .vnav.next { right:8px; }
  .vhint { position:absolute; bottom:14px; left:0; right:0; text-align:center; color:#fff;
    font-size:12px; opacity:.85; pointer-events:none; z-index:2; }

  /* ===== A4印刷（縦）：1枚目=平面図、2枚目以降=場所一覧 ===== */
  @media print {
    @page { size: A4 portrait; margin: 10mm; }
    * { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    body { background:#fff; overflow:visible; }
    .toolbar, .titlebar, .legend, .viewer { display:none !important; }
    .map-wrap { min-height:auto; page-break-after:always; }
    .map-inner { max-width:100%; }
    body .pin .lbl { display:block !important; }
    .pin.dim { opacity:1; }
    .pin.hit .dot { background:#d84a3a; transform:none; }
    .card { box-shadow:none; border:1px solid #bbb; page-break-inside:avoid; }
    .card.hidden { display:flex !important; }
    .card .thumb { display:none; }
  }
</style>
</head>

<div class="titlebar" id="titlebar" onclick="this.classList.toggle('min')">

const mapInner = document.getElementById('mapInner');
const cards = document.getElementById('cards');
let curIdx = null;
let vState = 'zoom';   // 'zoom'(拡大) → 'fit'(全体) → 閉じる

function isHit(s, q){ return q && (s.name.includes(q) || (s.items||[]).some(i=>i.includes(q))); }
function photoMode(){ return document.body.classList.contains('photo'); }

function render(){
  mapInner.querySelectorAll('.pin').forEach(p=>p.remove());
  cards.innerHTML = '';
  const q = document.getElementById('q').value.trim();
  const pm = photoMode();
  let shown = 0;

  SPOTS.forEach((s,idx)=>{
    const hit = isHit(s,q), miss = q && !hit;
    if(!miss) shown++;

    const pin = document.createElement('div');
    pin.className = 'pin' + (s.floor==='2階'?' f2':'') + (hit?' hit':'') + (miss?' dim':'');
    pin.style.left = (pm ? s.ax : s.x)+'%';
    pin.style.top  = (pm ? s.ay : s.y)+'%';
    pin.innerHTML = `<div class="dot">${s.no}</div><div class="lbl">${s.name}</div>`;
    pin.onclick = (e)=>{ e.stopPropagation(); openViewer(idx); };
    mapInner.appendChild(pin);

    const card = document.createElement('div');
    card.className = 'card' + (s.floor==='2階'?' f2':'') + (hit?' hit':'') + (miss?' hidden':'');
    card.innerHTML =
      `<div class="num">${s.no}</div>
       <img class="thumb" src="写真/thumb/${s.file}" loading="lazy">
       <div><div class="nm">${s.name}</div><div class="fl">${s.floor}</div></div>`;
    card.onclick = ()=>openViewer(idx);
    cards.appendChild(card);
  });
  document.getElementById('cnt').textContent = q ? shown+'/'+SPOTS.length : SPOTS.length;
}

/* ===== 写真ビューア（拡大→全体→閉じる） ===== */
function openViewer(idx){
  curIdx = idx;
  vState = 'zoom';
  applyViewer();
  document.getElementById('viewer').classList.add('show');
}
function applyViewer(){
  const s = SPOTS[curIdx];
  const img = document.getElementById('vImg');
  img.src = '写真/'+s.file;
  img.className = 'vimg ' + vState;
  document.getElementById('vName').textContent = s.no+'. '+s.name+'（'+s.floor+'）';
  document.getElementById('vState').textContent = vState==='zoom' ? '拡大' : '全体';
  document.getElementById('vHint').textContent =
    vState==='zoom' ? 'タップで全体表示 →' : 'もう一度タップで閉じる';
}
function cycleViewer(){
  if(vState==='zoom'){ vState='fit'; applyViewer(); }
  else { closeViewer(); }
}
function navViewer(d){
  if(curIdx===null) return;
  curIdx = (curIdx + d + SPOTS.length) % SPOTS.length;
  vState = 'zoom';
  applyViewer();
}
function closeViewer(){
  curIdx = null;
  document.getElementById('viewer').classList.remove('show');
}

function toggleLbl(){
  document.body.classList.toggle('showlbl');
  document.getElementById('lblBtn').classList.toggle('on', document.body.classList.contains('showlbl'));
}
function toggleBg(){
  document.body.classList.toggle('photo');
  document.getElementById('bgBtn').textContent =
    photoMode() ? '🗺️ 平面図' : '📷 航空写真';
  render();
}

document.getElementById('q').addEventListener('input', render);
document.addEventListener('keydown', e=>{
  if(!document.getElementById('viewer').classList.contains('show')) return;
  if(e.key==='Escape') closeViewer();
  if(e.key==='ArrowLeft') navViewer(-1);
  if(e.key==='ArrowRight') navViewer(1);
});
render();
</script>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>みどり造園 社内マップ（資材置き場）</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { font-family:"Yu Gothic UI","Hiragino Sans",Meiryo,sans-serif; background:#f0f4ef; color:#243324; }

  header { background:#2e5d34; color:#fff; padding:10px 14px; position:sticky; top:0; z-index:50; }
  header h1 { font-size:17px; }
  header p { font-size:11px; opacity:.85; margin-top:2px; }

  .toolbar { display:flex; gap:8px; padding:10px 12px; align-items:center; flex-wrap:wrap; }
  .toolbar input[type="text"] {
    flex:1; min-width:150px; padding:9px 12px; border:2px solid #9dbb9d; border-radius:20px;
    font-size:15px; outline:none; background:#fff;
  }
  .toolbar input[type="text"]:focus { border-color:#2e5d34; }
  .modebtn {
    font-size:12px; padding:8px 12px; border-radius:20px; border:2px solid #9dbb9d;
    background:#fff; color:#2e5d34; cursor:pointer; user-select:none;
  }
  .modebtn.on { background:#c8a24a; border-color:#c8a24a; color:#fff; }

  .legend { display:flex; gap:14px; padding:0 14px 8px; font-size:11px; color:#5a6e5a; align-items:center; flex-wrap:wrap; }
  .legend span { display:inline-flex; align-items:center; gap:4px; }
  .legend i { width:13px; height:13px; border-radius:50%; display:inline-block; border:2px solid #fff;
    box-shadow:0 0 2px rgba(0,0,0,.4); }
  .legend i.r{ background:#d84a3a;} .legend i.b{ background:#1e78c8;} .legend i.g{ background:#c8a24a;}

  /* ===== 地図 ===== */
  .map-wrap { margin:0 12px 10px; position:relative; border-radius:12px; overflow:hidden;
    box-shadow:0 2px 8px rgba(0,0,0,.15); background:#e8e4da; }
  .map-inner { position:relative; width:100%; }
  .map-inner svg { width:100%; display:block; }
  .map-inner img.aerial { width:100%; display:none; }
  body.photo .map-inner svg { display:none; }
  body.photo .map-inner img.aerial { display:block; }

  .pin { position:absolute; transform:translate(-50%,-50%); cursor:pointer; z-index:5;
    display:flex; flex-direction:column; align-items:center; }
  .pin .dot {
    width:23px; height:23px; border-radius:50%;
    background:#d84a3a; border:2px solid #fff; box-shadow:0 1px 4px rgba(0,0,0,.55);
    display:flex; align-items:center; justify-content:center;
    color:#fff; font-size:11px; font-weight:bold;
  }
  .pin.f2 .dot { background:#1e78c8; }
  .pin .lbl {
    margin-top:2px; background:rgba(255,255,255,.92); color:#243324; font-size:9px; font-weight:bold;
    padding:1px 5px; border-radius:7px; white-space:nowrap; box-shadow:0 1px 2px rgba(0,0,0,.4);
    max-width:110px; overflow:hidden; text-overflow:ellipsis;
  }
  body:not(.showlbl) .pin .lbl { display:none; }
  .pin.hit .dot { background:#c8a24a; transform:scale(1.15); }
  .pin.dim { opacity:.25; }
  .pin.active .dot { outline:3px solid #ffd97a; }

  .hint { margin:0 14px 10px; font-size:11px; color:#5a6e5a; }

  /* ===== 場所一覧 ===== */
  .list { padding:0 12px 90px; }
  .list h2 { font-size:13px; color:#2e5d34; margin:8px 2px 6px; }
  .cards { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
  @media (max-width:520px){ .cards { grid-template-columns:1fr; } }
  .card {
    background:#fff; border-radius:10px; padding:8px 10px; cursor:pointer;
    box-shadow:0 1px 4px rgba(0,0,0,.08); display:flex; align-items:center; gap:9px;
  }
  .card .num {
    flex:none; width:26px; height:26px; border-radius:50%; background:#d84a3a; color:#fff;
    font-size:12px; font-weight:bold; display:flex; align-items:center; justify-content:center;
  }
  .card.f2 .num { background:#1e78c8; }
  .card.hit .num { background:#c8a24a; }
  .card .nm { font-size:14px; font-weight:bold; }
  .card .fl { font-size:10px; color:#7a8f7a; margin-top:1px; }
  .card.hidden { display:none; }
  .card .thumb { flex:none; width:42px; height:42px; border-radius:6px; object-fit:cover; }

  /* ===== 詳細シート ===== */
  .overlay { position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:90; display:none; }
  .overlay.show { display:block; }
  .sheet {
    position:fixed; left:0; right:0; bottom:0; max-height:85vh; overflow-y:auto; z-index:100;
    background:#fff; border-radius:16px 16px 0 0; padding:16px 16px 30px;
    transform:translateY(105%); transition:transform .25s ease;
    box-shadow:0 -4px 20px rgba(0,0,0,.3);
  }
  .sheet.show { transform:translateY(0); }
  .sheet .grip { width:44px; height:5px; border-radius:3px; background:#ccc; margin:0 auto 12px; }
  .sheet h3 { font-size:19px; color:#2e5d34; display:flex; align-items:center; gap:8px; }
  .sheet h3 .num { width:28px; height:28px; border-radius:50%; background:#d84a3a; color:#fff;
    font-size:14px; display:inline-flex; align-items:center; justify-content:center; flex:none; }
  .sheet h3.f2 .num { background:#1e78c8; }
  .fbadge { display:inline-block; font-size:11px; font-weight:bold; padding:3px 12px; border-radius:12px;
    margin:8px 0 10px; background:#d84a3a; color:#fff; }
  .fbadge.f2 { background:#1e78c8; }
  .sheet .photo { width:100%; border-radius:10px; display:block; cursor:zoom-in; background:#eee; }
  .sheet h4 { font-size:13px; color:#2e5d34; margin:12px 0 5px; border-left:4px solid #c8a24a; padding-left:7px; }
  .tags { display:flex; flex-wrap:wrap; gap:6px; }
  .tag { background:#e6efe6; color:#2e5d34; font-size:13px; padding:5px 11px; border-radius:14px; }
  .tag.hit { background:#c8a24a; color:#fff; font-weight:bold; }
  .nav2 { display:flex; gap:8px; margin-top:14px; }
  .nav2 button { flex:1; padding:10px 0; border-radius:20px; border:none; font-size:14px; cursor:pointer;
    background:#e6efe6; color:#2e5d34; font-weight:bold; }
  .closebtn { display:block; margin:10px auto 0; padding:9px 40px; border-radius:20px; border:none;
    background:#2e5d34; color:#fff; font-size:14px; cursor:pointer; }

  .bigview { position:fixed; inset:0; background:rgba(0,0,0,.9); z-index:300; display:none;
    align-items:center; justify-content:center; }
  .bigview.show { display:flex; }
  .bigview img { max-width:96vw; max-height:92vh; border-radius:8px; }

  @media (min-width:800px) {
    .sheet { left:auto; right:20px; bottom:20px; width:440px; border-radius:16px; max-height:80vh; }
    /* 右側のピンを押したら写真は左に出す（押した場所＝ボタンをよける） */
    .sheet.leftside { left:20px; right:auto; }
    header h1 { font-size:19px; }
  }

  /* ===== A4印刷（縦）：1枚目=平面図、2枚目以降=場所一覧 ===== */
  @media print {
    @page { size: A4 portrait; margin: 10mm; }
    * { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    body { background:#fff; }
    .toolbar, .hint, .overlay, .sheet, .modebtn, .bigview, .legend { display:none !important; }
    header { position:static; border-radius:0; }
    body .pin .lbl { display:block !important; }
    .map-wrap { margin:8px 0; box-shadow:none; border:1px solid #999; border-radius:0;
      page-break-inside:avoid; page-break-after:always; }
    .pin.dim { opacity:1; }
    .pin.hit .dot { background:#d84a3a; transform:none; }
    .list { padding:0; }
    .card { box-shadow:none; border:1px solid #bbb; page-break-inside:avoid; }
    .card.hidden { display:flex !important; }
    .card .thumb { display:none; }
  }
</style>
</head>
<body class="showlbl">

<header>

  <p>番号ピンを押すと写真と場所の名前が出ます／名前は仮です。良い呼び名があれば水野まで！</p>

const mapInner = document.getElementById('mapInner');
const cards = document.getElementById('cards');
let curIdx = null;

function isHit(s, q){ return q && (s.name.includes(q) || (s.items||[]).some(i=>i.includes(q))); }
function photoMode(){ return document.body.classList.contains('photo'); }

function render(){
  mapInner.querySelectorAll('.pin').forEach(p=>p.remove());
  cards.innerHTML = '';
  const q = document.getElementById('q').value.trim();
  const pm = photoMode();
  let shown = 0;

  SPOTS.forEach((s,idx)=>{
    const hit = isHit(s,q), miss = q && !hit;
    if(!miss) shown++;

    const pin = document.createElement('div');
    pin.className = 'pin' + (s.floor==='2階'?' f2':'') + (hit?' hit':'') + (miss?' dim':'')
                    + (idx===curIdx?' active':'');
    pin.style.left = (pm ? s.ax : s.x)+'%';
    pin.style.top  = (pm ? s.ay : s.y)+'%';
    pin.innerHTML = `<div class="dot">${s.no}</div><div class="lbl">${s.name}</div>`;
    pin.onclick = (e)=>{ e.stopPropagation(); openSheet(idx); };
    mapInner.appendChild(pin);

    const card = document.createElement('div');
    card.className = 'card' + (s.floor==='2階'?' f2':'') + (hit?' hit':'') + (miss?' hidden':'');
    card.innerHTML =
      `<div class="num">${s.no}</div>
       <img class="thumb" src="写真/thumb/${s.file}" loading="lazy">
       <div><div class="nm">${s.name}</div><div class="fl">${s.floor}</div></div>`;
    card.onclick = ()=>openSheet(idx);
    cards.appendChild(card);
  });
  document.getElementById('cnt').textContent = q ? shown+'/'+SPOTS.length : SPOTS.length;
}

function openSheet(idx){
  curIdx = idx;
  const s = SPOTS[idx];
  const q = document.getElementById('q').value.trim();
  const f2 = s.floor==='2階';
  const body = document.getElementById('sheetBody');
  const itemsHtml = (s.items&&s.items.length)
    ? `<h4>置いてある材料・機械</h4><div class="tags">${s.items.map(i=>`<span class="tag${q&&i.includes(q)?' hit':''}">${i}</span>`).join('')}</div>`
    : '';
  body.innerHTML = `
    <h3 class="${f2?'f2':''}"><span class="num">${s.no}</span>${s.name}</h3>
    <span class="fbadge ${f2?'f2':''}">${s.floor}</span>
    <img class="photo" src="写真/${s.file}" alt="${s.name}" onclick="enlarge('${s.file}')">
    ${itemsHtml}
  `;
  render();
  // 押したピンが右半分なら写真を左に、左半分なら右に出す（押した場所をよける／PC表示のみ有効）
  const xpct = photoMode() ? s.ax : s.x;
  document.getElementById('sheet').classList.toggle('leftside', xpct > 50);
  document.getElementById('ov').classList.add('show');
  document.getElementById('sheet').classList.add('show');
}
function navSheet(d){
  if(curIdx===null) return;
  openSheet((curIdx + d + SPOTS.length) % SPOTS.length);
}
function closeSheet(){
  curIdx = null;
  document.getElementById('ov').classList.remove('show');
  document.getElementById('sheet').classList.remove('show');
  render();
}
function enlarge(file){
  document.getElementById('bigImg').src = '写真/'+file;
  document.getElementById('bigview').classList.add('show');
}
function toggleLbl(){
  document.body.classList.toggle('showlbl');
  document.getElementById('lblBtn').classList.toggle('on', document.body.classList.contains('showlbl'));
}
function toggleBg(){
  document.body.classList.toggle('photo');
  document.getElementById('bgBtn').textContent =
    photoMode() ? '🗺️ 平面図に切替' : '📷 航空写真に切替';
  render();
}

document.getElementById('q').addEventListener('input', render);
render();
</script>
